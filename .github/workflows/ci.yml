name: CI

on:
  push:
    branches: [master, "feat/**"]
  pull_request:
    branches: [master]

# Cancel superseded runs on the same ref (e.g. a rapid second push).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Typecheck & test (Node 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # The suite spawns real ffmpeg/ffprobe (probe, transcode pacing, thumbs,
      # subtitle extraction); the Linux-only tests are not skipped here.
      - name: Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
